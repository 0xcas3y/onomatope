# 🌸 あ行 — 拟声拟态词详解

> 📚 日文例句来自 [Immersion Kit](https://www.immersionkit.com/dictionary)（漫画/动画实例）

## 🟢 あ段

### ① あたふた　`p.44`

> 📖 **词义**｜遇突发状况慌乱失措、手忙脚乱的样子。「慌てふためく」的口语化说法。

🎯 **用法核心**｜「**意料之外**」+「**手脚慌乱的动作**」两个条件都要有。重点在**动作的慌**，而不是心里的慌。

🔗 **常搭**｜〜する／〜逃げ出す／〜駆けつける／〜取り出す

🆚 **近义辨析**

| 词 | 核心 | 例 |
|---|---|---|
| **あたふた** | 动作的慌 | 忘れ物に気づいて、あたふた家を出る |
| おろおろ | 心慌、快哭 | 子どもに泣かれておろおろする |
| うろうろ | 没目的走动 | 駅前をうろうろする |
| そそくさ | 急着离开现场 | そそくさと席を立つ |
| ばたばた | 忙得叮咣响 | 出張準備でばたばたしている |

💡 **一句话**｜あたふた=身体慌 ｜ おろおろ=心慌 ｜ うろうろ=没方向 ｜ そそくさ=想逃 ｜ ばたばた=忙得响

🎬 **漫画例句**　[🔎 IK 搜索](https://www.immersionkit.com/dictionary?keyword=%E3%81%82%E3%81%9F%E3%81%B5%E3%81%9F&exact=true)

> **HUNTER×HUNTER**
> あのジンが**あたふた**している。
> → *那个金竟然也慌得手忙脚乱。*

### ② あっさり　`p.49, 107`

> 📖 **词义**｜① 味道/颜色/性格等**不浓腻、清淡**；② 事情出乎意料地**简单、轻易**就结束。

🎯 **用法核心**｜表达"**没有浓度/粘度/阻力**"这种"缺席感"。从味觉到性格再到事态进展，通用性很强。

🔗 **常搭**｜〜した味／〜認める／〜負ける／〜断る／〜している

🆚 **近义辨析**

| 词 | 核心 | 例 |
|---|---|---|
| **あっさり** | 不浓 / 出乎意料地简单 | あっさり勝負がついた |
| さっぱり | 爽快感、后味清爽 | お風呂でさっぱりした |
| すっきり | 疙瘩解开、明快 | 説明を聞いてすっきりした |
| けろっと | 若无其事、像啥也没发生 | 叱られてもけろっとしている |

💡 **一句话**｜味道上「さっぱり=清爽后味」「あっさり=不浓=薄味」；事情上「あっさり=比想象简单」。

🎬 **漫画例句**　[🔎 IK 搜索](https://www.immersionkit.com/dictionary?keyword=%E3%81%82%E3%81%A3%E3%81%95%E3%82%8A&exact=true)

> **ココロコネクト**
> お前ら　**あっさり**認めすぎじゃないか
> → *你们也**太爽快**地承认了吧。*

> **フルーツバスケット**
> **あっさり**しているけれど…
> → *虽然**清淡**……*

> **俺の妹がこんなに可愛いわけがない**
> **あっさり**と　笑いながら
> → *（她）**爽朗**地笑着。*

## 🟢 い段

### ③ いそいそ　`p.51`

> 📖 **词义**｜因期待、高兴而心情雀跃，**喜气洋洋地做准备/行动**的样子。

🎯 **用法核心**｜**期待感鼓胀→溢出到动作上**。心里的兴奋从动作里看得出来。用在自己身上稍显难为情，多是微笑着／揶揄着描写别人。

🔗 **常搭**｜〜と出かける／〜と支度する／〜とやってくる

🆚 **近义辨析**

| 词 | 核心 | 例 |
|---|---|---|
| **いそいそ** | 期待变成**动作** | デートにいそいそと出かける |
| うきうき | 期待停留在**心情** | 明日の旅行でうきうきしている |
| わくわく | 心跳加速、带**悬念**的期待 | 新作ゲームにわくわくする |
| にこにこ | 喜悦挂在**脸上** | プレゼントをもらってにこにこ |

💡 **一句话**｜いそいそ=雀跃到动作 ｜ うきうき=心里雀跃 ｜ わくわく=心跳期待 ｜ にこにこ=笑容

🎬 **漫画例句**　[🔎 IK 搜索](https://www.immersionkit.com/dictionary?keyword=%E3%81%84%E3%81%9D%E3%81%84%E3%81%9D&exact=true)

> **涼宮ハルヒの憂鬱**
> かわいらしいレターセットに**いそいそ**とペンを走らせている光景
> → *她在可爱的信纸上**兴高采烈**地挥笔的样子。*

> **とらドラ！**
> （大河）"**いそいそ**"とか"ウキウキ"とか思ってないでしょうね！
> → *大河：你不会在想什么「**欢天喜地**」「兴奋」的吧！*

### ④ いらいら　`p.64`

> 📖 **词义**｜事情不顺或不快刺激持续，神经像被扎一样**焦躁不安**。

🎯 **用法核心**｜**刺刺的持续性不快**。原因可外可内——堵车、噪音、对方态度；饿肚子、困倦。属于**愤怒的前一步**，长期性压力。

🔗 **常搭**｜〜する／〜が募る／〜をぶつける

🆚 **近义辨析**

| 词 | 核心 | 例 |
|---|---|---|
| **いらいら** | 神经持续**刺刺逆立** | 電車が遅れていらいらする |
| むかむか | 胃部的**恶心般**怒气 | あの態度、むかむかする |
| かりかり | 因焦躁而**态度尖刻** | 何をかりかりしているの |
| ぴりぴり | 神经**绷紧过敏**的紧张 | 試験前でぴりぴりしている |
| うんざり | 同样的事持续，**厌烦透顶** | 毎日の残業にうんざり |

💡 **怒气强度**｜うんざり ＜ **いらいら** ＜ むかむか ＜ かっか/かんかん。
＊ぴりぴり 不是怒气，而是"绷紧的紧张"。

🎬 **漫画例句**　[🔎 IK 搜索](https://www.immersionkit.com/dictionary?keyword=%E3%81%84%E3%82%89%E3%81%84%E3%82%89&exact=true)

> **さくら荘のペットな彼女**
> ただ　その**いらいら**するんですよ
> → *就是，它让人**心烦**。*

> **俺の妹がこんなに可愛いわけがない**
> なんかむかむかして　**いらいら**して
> → *又**腻味**又**烦躁**。*

## 🟢 う段

### ⑤ うきうき　`p.52`

> 📖 **词义**｜因期待/高兴而**心情雀跃、飘飘然**的样子。

🎯 **用法核心**｜重点在**心情本身**——期待值让心里发痒。可以**静止不动**地うきうき（≠必须动起来的「いそいそ」）。

🔗 **常搭**｜〜する／〜気分／〜顔／〜と待つ

🆚 **近义辨析**

| 词 | 核心 | 例 |
|---|---|---|
| **うきうき** | 心情雀跃（不必动） | 旅行前夜うきうきして眠れない |
| いそいそ | 雀跃化为**动作** | いそいそと出かける |
| わくわく | 期待带着**心跳**、未知感 | 新作ゲームにわくわく |
| にこにこ | 喜悦挂在**脸上** | プレゼントでにこにこ |
| ほくほく | 暗自得意、**占到便宜**的味道 | 臨時ボーナスにほくほく |

💡 **一句话**｜うきうき=心里雀跃 ｜ いそいそ=雀跃到动作 ｜ わくわく=心跳 ｜ にこにこ=笑容 ｜ ほくほく=偷着乐

🎬 **漫画例句**　[🔎 IK 搜索](https://www.immersionkit.com/dictionary?keyword=%E3%81%86%E3%81%8D%E3%81%86%E3%81%8D&exact=true)

> **Cardcaptor Sakura**
> さくらちゃんが朝から**ウキウキ**してらっしゃるということは…
> → *小樱酱一大早就**这么雀跃**，意思是……*

> **とらドラ！**
> （大河）"いそいそ"とか"**ウキウキ**"とか思ってないでしょうね！
> → *大河：你不会在想什么「兴高采烈」「**雀跃**」吧！*

> **ご注文はうさぎですか？**
> それにしても**ウキウキ**しすぎかしら
> → *话说回来，是不是**太雀跃**了点？*

### ⑥ うじうじ　`p.40`

> 📖 **词义**｜为琐事或过去反复纠结、下不了决心、缩手缩脚的样子。

🎯 **用法核心**｜**优柔寡断 + 内心绕圈**。不是单纯的慢，是"该决断时决断不了"或"过去的失败放不下"。常带贬义/揶揄。

🔗 **常搭**｜〜する／〜と悩む／〜考える

🆚 **近义辨析**

| 词 | 核心 | 例 |
|---|---|---|
| **うじうじ** | 优柔寡断 / 放不下过去 | いつまでもうじうじ悩むな |
| ぐずぐず | 动作**慢吞吞**、拖拉 | ぐずぐずしてないで行くよ |
| もたもた | 动作**笨拙、迟缓** | もたもたして時間がない |
| くよくよ | 为小事**担心、郁郁** | くよくよしても仕方ない |
| めそめそ | **没完没了小声哭** | 失恋でめそめそする |

💡 **一句话**｜うじうじ=心里绕圈 ｜ ぐずぐず=动作拖 ｜ もたもた=手脚笨 ｜ くよくよ=小事忧心 ｜ めそめそ=哭个不停

🎬 **漫画例句**　[🔎 IK 搜索](https://www.immersionkit.com/dictionary?keyword=%E3%81%86%E3%81%98%E3%81%86%E3%81%98&exact=true)

## 🟢 お段

### ⑱ おいおい　`p.62`

> 📖 **词义**｜大人**放声号哭**的拟声词，"哇哇大哭"的书面表达。

🎯 **用法核心**｜**大人也用的号啕大哭**，声音大且持续。**文学/书面色彩强**，日常口语少见。
⚠️ 同形的感叹词「おいおい」（喂喂／拜托了）才是现代日常的高频用法，两者意义完全不同。

🔗 **常搭**｜〜と泣く／〜と声を上げる

🆚 **近义辨析**

| 词 | 核心 | 例 |
|---|---|---|
| **おいおい**（哭）| **号啕大哭**（书面） | おいおいと泣く |
| わんわん | **嚎啕**（口语、夸张） | わんわん泣く |
| えーんえーん | **小孩**放声哭 | えーんえーんと泣く |
| しくしく | **抽泣**（声小） | しくしく泣く |
| おんおん | **嗚嗚**大哭（略带方言感） | おんおん泣く |

💡 **一句话**｜おいおい=号啕（文学） ｜ わんわん=嚎啕（口语） ｜ えーんえーん=小孩放声 ｜ しくしく=抽噎 ｜ おんおん=嗚嗚

🎬 **漫画例句**　[🔎 IK 搜索](https://www.immersionkit.com/dictionary?keyword=%E3%81%8A%E3%81%84%E3%81%8A%E3%81%84&exact=true)

＊ IK 收录的「おいおい」几乎都是感叹词义（喂喂／拜托）。"号啕"义在现代动画中已罕见，以下仅供对比感叹词用法：

> **CLANNAD**
> **おいおい**…
> → ***哎呀呀**……*（感叹：不是吧）

> **ソードアート・オンライン**
> **おいおい**…
> → ***喂喂**……*（感叹：别这样）

> **神のみぞ知るセカイ**
> **おいおい**…
> → ***拜托**……*（感叹：无语）

### ⑲ おどおど　`p.54`

> 📖 **词义**｜因害怕、没底气，态度**畏缩、心神不宁**。

🎯 **用法核心**｜**胆怯 + 目光躲闪/声音发颤/手脚不稳**。表现"怕被责备/怕被发现"的心虚。
＊不是生理性发抖（ぶるぶる），而是**情绪性畏缩**。

🔗 **常搭**｜〜する／〜した態度／〜と答える

🆚 **近义辨析**

| **おどおど** | **怯场、心虚**（持续） | 初対面でおどおど |
| びくびく | **怕被责备**、战战兢兢 | びくびくしながら |
| そわそわ | **静不下心**（紧张或兴奋） | デート前でそわそわ |
| もじもじ | **扭扭捏捏**（害羞） | 告白できずもじもじ |
| ぶるぶる | **身体颤抖**（冷/怕） | 寒くてぶるぶる |

💡 **一句话**｜おどおど=畏缩心虚 ｜ びくびく=怕挨训 ｜ そわそわ=坐立不安 ｜ もじもじ=扭捏害羞 ｜ ぶるぶる=身体发抖

> **あの日見た花の名前を僕達はまだ知らない。**

> → *以前总是**怯怯的**……*

### ⑳ おろおろ　`p.44`

> 📖 **词义**｜遇到意外/坏消息，**慌得不知如何是好、快哭出来**。

<script>
// 配置 marked
marked.setOptions({ breaks: false, gfm: true });

// 渲染所有 MD
const SECTIONS = ['a', 'ka', 'sa', 'ta'];
SECTIONS.forEach(id => {
  const md = document.getElementById('md-' + id).textContent;
  const html = marked.parse(md);
  document.getElementById('section-' + id).innerHTML = html;
});

// 将每个 h3 + 后续兄弟节点直到下一个 h3/h2/hr 包装成 .entry
SECTIONS.forEach(id => {
  const sec = document.getElementById('section-' + id);
  const children = Array.from(sec.children);
  let i = 0;
  while (i < children.length) {
    const el = children[i];
    if (el.tagName === 'H3') {
      const group = [el];
      let j = i + 1;
      while (j < children.length) {
        const next = children[j];
        if (next.tagName === 'H3' || next.tagName === 'H2' || next.tagName === 'HR') break;
        group.push(next);
        j++;
      }
      const wrap = document.createElement('div');
      wrap.className = 'entry';
      el.parentNode.insertBefore(wrap, el);
      group.forEach(g => wrap.appendChild(g));
      // Also absorb trailing <hr> to keep layout clean
      if (j < children.length && children[j].tagName === 'HR') {
        children[j].remove();
        j++;
      }
      i = j;
    } else {
      i++;
    }
  }
});

// Tab 切换
document.querySelectorAll('nav.tabs button[data-target]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.getElementById('section-' + btn.dataset.target).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    document.getElementById('searchInput').value = '';
    filterEntries('');
  });
});

// 搜索
const searchInput = document.getElementById('searchInput');
const searchInfo = document.getElementById('searchInfo');
const noMatch = document.getElementById('noMatch');

function filterEntries(q) {
  q = q.trim().toLowerCase();
  const activeSection = document.querySelector('.content-section.active');
  const entries = activeSection.querySelectorAll('.entry');
  let matchCount = 0;
  entries.forEach(e => {
    if (!q) {
      e.classList.remove('hidden');
      matchCount++;
      return;
    }
    const txt = e.textContent.toLowerCase();
    if (txt.includes(q)) {
      e.classList.remove('hidden');
      matchCount++;
    } else {
      e.classList.add('hidden');
    }
  });
  if (q) {
    searchInfo.textContent = '找到 ' + matchCount + ' 条';
    noMatch.classList.toggle('hidden', matchCount > 0);
    // 同时隐藏 h2
    activeSection.querySelectorAll('h2').forEach(h => h.classList.add('hidden'));
  } else {
    searchInfo.textContent = '';
    noMatch.classList.add('hidden');
    activeSection.querySelectorAll('h2').forEach(h => h.classList.remove('hidden'));
  }
}
searchInput.addEventListener('input', () => filterEntries(searchInput.value));

// 支持 URL hash（例如 #section-ka）
if (location.hash && location.hash.startsWith('#section-')) {
  const id = location.hash.replace('#section-', '');
  const btn = document.querySelector('nav.tabs button[data-target="' + id + '"]');
  if (btn) btn.click();
}
</script>
